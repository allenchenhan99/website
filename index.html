<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Website</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="nav-links">
                <a href="index.html" class="nav-link active">Home</a>
                <a href="profile.html" class="nav-link">Profile</a>
                <a href="cv.html" class="nav-link">CV</a>
                <a href="music.html" class="nav-link">Music</a>
                <a href="perfume.html" class="nav-link">Perfume</a>
            </div>
            <button class="theme-toggle" @click="toggleTheme" :title="darkMode ? 'Switch to light mode' : 'Switch to dark mode'">
                {{ darkMode ? '☀️' : '🌙' }}
            </button>
        </nav>

        <!-- Main Content -->
        <main class="content">
            <!-- ASCII Art -->
            <div class="ascii-art" id="ascii-art"></div>

            <!-- Chipi Animation -->
            <div class="chipi-animation" id="chipi-animation"></div>

            <!-- Categories Section -->
            <section class="categories">
                <div class="category-list">
                    <a href="profile.html" class="category-item">
                        <span class="category-title">Profile</span>
                        <span class="category-desc">About me and my journey</span>
                    </a>
                    <a href="cv.html" class="category-item">
                        <span class="category-title">CV</span>
                        <span class="category-desc">Curriculum Vitae</span>
                    </a>
                    <a href="music.html" class="category-item">
                        <span class="category-title">Music</span>
                        <span class="category-desc">Albums, songs & reflections</span>
                    </a>
                    <a href="perfume.html" class="category-item">
                        <span class="category-title">Perfume</span>
                        <span class="category-desc">Fragrance journey & reviews</span>
                    </a>
                </div>
            </section>
        </main>
    </div>

    <script src="https://unpkg.com/vue@3"></script>
    <script src="js/app.js"></script>
</body>
</html>
